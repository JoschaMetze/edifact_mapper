# SG4 — Party data: NAD (entry) + FII + FTX[Z13] + FTX[Z15]
#
# NAD is the entry segment — each NAD creates a new SG4 rep.
# FII/FTX are consumed by the first rep only (after entry NAD, before next NAD).
# All qualifiers/codes are DATA fields to prevent phantom segments in non-first reps.

