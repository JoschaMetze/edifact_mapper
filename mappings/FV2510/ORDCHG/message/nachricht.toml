# Nachricht (message header) mapping for ORDCHG.
#
# Source: Root-level segments (outside any SG group)
# BGM+Z51+GENERATED00001+1  → dokumenttyp, dokumentennummer, nachrichtenfunktion
# DTM+137:20250401...        → erstellungsdatum
# UNS+S                      → section separator

[meta]
entity = "Nachricht"
bo4e_type = "Nachricht"
source_group = ""
source_path = ""

[fields]
"bgm.c002.d1001" = "dokumenttyp"
"bgm.c106.d1004" = "dokumentennummer"
"bgm.d1225" = "nachrichtenfunktion"
"dtm[137].c507.d2005" = { target = "", default = "137" }
"dtm[137].c507.d2380" = "erstellungsdatum"
"dtm[137].c507.d2379" = { target = "", default = "303" }
"uns.d0081" = { target = "", default = "S" }
