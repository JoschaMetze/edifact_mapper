# Marktteilnehmer (market participant) mapping for COMDIS.
#
# Source: SG1 → NAD + CTA + COM (flat — no nested SG for CTA/COM)
#   NAD+MS+9900269000000::293  → Absender
#   CTA+IC+:Abrechnung         → Ansprechpartner (only MS rep)
#   COM+Abrechnung@netz.de:EM  → Kontakt (only MS rep)
#   NAD+MR+9978842000002::293  → Empfaenger
#
# No discriminator — produces array of Marktteilnehmer (one per SG1 rep).
# CTA/COM fields as data (not defaults) to prevent phantom in MR rep.

[meta]
entity = "Marktteilnehmer"
bo4e_type = "Marktteilnehmer"
source_group = "SG1"
source_path = "sg1"

[fields]
"nad.d3035" = "marktrolle"
"nad.c082.d3039" = "rollencodenummer"
"nad.c082.d1131" = "codelisteCode"
"nad.c082.d3055" = "rollencodetyp"
"cta.d3139" = "kontaktFunktion"
"cta.c056.d3413" = "kontaktNummer"
"cta.c056.d3412" = "kontaktName"
"com.c076.d3148" = "kommunikationsadresse"
"com.c076.d3155" = "kommunikationstyp"
